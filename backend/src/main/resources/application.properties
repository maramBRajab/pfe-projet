# Base de données — surcharger via application-local.properties
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/affectation_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Serveur
server.port=8082

# JWT
app.security.jwt.secret=${JWT_SECRET:c21hcnRhc3NpZ24tc2VjcmV0LWtleS0yMDI2LXByb2R1Y3Rpb24=}
app.security.jwt.expiration-ms=86400000

# Reinitialisation mot de passe
app.password-reset.token-expiration-minutes=30
app.frontend.reset-password-url=http://localhost:4200/reset-password

# Email sortant
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Désactiver security auto
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration