# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/affectation_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Server
server.port=${SERVER_PORT:8082}

# JWT
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Password reset and email verification
app.password-reset.token-expiration-minutes=${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:4200/reset-password}
app.email-verification.token-expiration-minutes=${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MINUTES:1440}
app.email-verification.url=${EMAIL_VERIFICATION_URL:http://localhost:4200/verify-email}
app.email-verification.require-delivery=${EMAIL_VERIFICATION_REQUIRE_DELIVERY:true}
app.email-verification.check-mx-records=${EMAIL_VERIFICATION_CHECK_MX_RECORDS:true}

# Outbound SMTP
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:15000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:15000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:15000}
spring.mail.default-encoding=UTF-8

# SmartAssign mail options
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM:}
app.mail.dev-log-reset-link=${MAIL_DEV_LOG_RESET_LINK:true}

# Demo/bootstrap accounts are disabled by default to avoid committed credentials.
app.bootstrap.demo-users.enabled=${BOOTSTRAP_DEMO_USERS_ENABLED:false}
app.bootstrap.demo.admin.email=${BOOTSTRAP_DEMO_ADMIN_EMAIL:}
app.bootstrap.demo.admin.password=${BOOTSTRAP_DEMO_ADMIN_PASSWORD:}
app.bootstrap.demo.manager.email=${BOOTSTRAP_DEMO_MANAGER_EMAIL:}
app.bootstrap.demo.manager.password=${BOOTSTRAP_DEMO_MANAGER_PASSWORD:}
app.bootstrap.demo.collab.email=${BOOTSTRAP_DEMO_COLLAB_EMAIL:}
app.bootstrap.demo.collab.password=${BOOTSTRAP_DEMO_COLLAB_PASSWORD:}

# Disable default Spring Security user
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Anthropic Claude manager IA fallback
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=${ANTHROPIC_API_URL:https://api.anthropic.com/v1/messages}
anthropic.api.model=${ANTHROPIC_API_MODEL:claude-sonnet-4-20250514}

# Notifications scheduler
app.notifications.scheduler.enabled=${NOTIFICATIONS_SCHEDULER_ENABLED:false}
app.notifications.scheduler.cron=${NOTIFICATIONS_SCHEDULER_CRON:0 0 8 * * *}
