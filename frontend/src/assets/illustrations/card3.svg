<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- bg blobs -->
  <circle cx="60"  cy="50"  r="50" fill="#eff6ff" opacity=".6"/>
  <circle cx="240" cy="160" r="55" fill="#dbeafe" opacity=".4"/>

  <!-- whiteboard / screen -->
  <rect x="38" y="32" width="160" height="108" rx="10" fill="white"
        style="filter:drop-shadow(0 4px 16px rgba(37,99,235,.12))"/>
  <rect x="38" y="32" width="160" height="10" rx="10" fill="#2563eb"/>
  <!-- screen dots -->
  <circle cx="50" cy="37" r="2.5" fill="white" opacity=".6"/>
  <circle cx="58" cy="37" r="2.5" fill="white" opacity=".6"/>
  <circle cx="66" cy="37" r="2.5" fill="white" opacity=".6"/>
  <!-- screen title line -->
  <rect x="50" y="52" width="60" height="5" rx="2.5" fill="#e2e8f0"/>

  <!-- bar chart inside screen -->
  <!-- axes -->
  <line x1="58" y1="118" x2="58"  y2="64" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="58" y1="118" x2="185" y2="118" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- bars -->
  <rect x="66"  y="98"  width="18" height="20" rx="3" fill="#bfdbfe"/>
  <rect x="92"  y="88"  width="18" height="30" rx="3" fill="#93c5fd"/>
  <rect x="118" y="76"  width="18" height="42" rx="3" fill="#60a5fa"/>
  <rect x="144" y="64"  width="18" height="54" rx="3" fill="#2563eb"/>
  <!-- bar labels -->
  <text x="75"  y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94a3b8">Q1</text>
  <text x="101" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94a3b8">Q2</text>
  <text x="127" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94a3b8">Q3</text>
  <text x="153" y="128" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2563eb">Q4</text>
  <!-- trend arrow up -->
  <path d="M72 98 Q100 85 128 76 Q143 70 158 65" stroke="#16a34a" stroke-width="2" stroke-linecap="round" fill="none" stroke-dasharray="4 2"/>
  <polygon points="162,60 158,70 152,63" fill="#16a34a"/>

  <!-- screen stand -->
  <rect x="108" y="140" width="20" height="12" rx="3" fill="#cbd5e1"/>
  <rect x="92"  y="150" width="52" height="7"  rx="3.5" fill="#94a3b8"/>

  <!-- person: legs -->
  <path d="M228 168 Q230 182 226 193" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
  <path d="M248 168 Q252 183 256 193" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
  <!-- person body -->
  <rect x="218" y="122" width="40" height="50" rx="12" fill="#2563eb"/>
  <!-- arm pointing at chart -->
  <path d="M218 138 Q190 130 202 140" stroke="#fcd9b6" stroke-width="10" stroke-linecap="round"/>
  <circle cx="200" cy="140" r="6" fill="#fcd9b6"/>
  <!-- pointer stick -->
  <line x1="200" y1="140" x2="163" y2="100" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- other arm -->
  <path d="M258 138 Q266 146 264 160" stroke="#fcd9b6" stroke-width="10" stroke-linecap="round"/>
  <!-- neck -->
  <rect x="228" y="110" width="18" height="14" rx="6" fill="#fcd9b6"/>
  <!-- head -->
  <circle cx="237" cy="98" r="19" fill="#fcd9b6"/>
  <!-- hair -->
  <path d="M218 92 Q220 78 237 76 Q254 74 257 90 L255 97 Q247 82 237 83 Q224 84 218 94Z" fill="#1e293b"/>
  <!-- eyes -->
  <ellipse cx="231" cy="97" rx="2.5" ry="3" fill="#1e293b"/>
  <ellipse cx="243" cy="97" rx="2.5" ry="3" fill="#1e293b"/>
  <!-- smile -->
  <path d="M231 106 Q237 111 243 106" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- floating badge: +87% -->
  <rect x="230" y="50" width="46" height="26" rx="13" fill="#16a34a"
        style="filter:drop-shadow(0 4px 10px rgba(22,163,74,.30))"/>
  <text x="253" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="white">+87%</text>
</svg>