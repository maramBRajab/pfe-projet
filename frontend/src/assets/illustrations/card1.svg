<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- bg blobs -->
  <circle cx="230" cy="30" r="70" fill="#dbeafe" opacity=".45"/>
  <circle cx="30"  cy="170" r="45" fill="#eff6ff" opacity=".7"/>

  <!-- desk surface -->
  <rect x="30" y="142" width="220" height="10" rx="5" fill="#cbd5e1"/>
  <!-- desk legs -->
  <rect x="50"  y="152" width="8" height="36" rx="4" fill="#94a3b8"/>
  <rect x="222" y="152" width="8" height="36" rx="4" fill="#94a3b8"/>

  <!-- laptop base -->
  <rect x="88" y="128" width="104" height="14" rx="5" fill="#e2e8f0"/>
  <!-- laptop hinge shadow -->
  <rect x="94" y="126" width="92" height="4" rx="2" fill="#cbd5e1"/>
  <!-- laptop screen body -->
  <rect x="98"  y="72" width="84" height="58" rx="8" fill="#1e293b"/>
  <!-- screen face -->
  <rect x="103" y="77" width="74" height="50" rx="5" fill="#2563eb"/>
  <!-- screen content: top bar -->
  <rect x="108" y="82" width="64" height="5" rx="2.5" fill="white" opacity=".25"/>
  <!-- screen content: rows -->
  <rect x="108" y="92"  width="44" height="4" rx="2" fill="white" opacity=".6"/>
  <rect x="108" y="100" width="34" height="4" rx="2" fill="white" opacity=".45"/>
  <rect x="108" y="108" width="54" height="4" rx="2" fill="white" opacity=".45"/>
  <rect x="108" y="116" width="28" height="4" rx="2" fill="white" opacity=".3"/>

  <!-- person: legs/hips sitting -->
  <rect x="175" y="118" width="32" height="26" rx="10" fill="#334155"/>
  <!-- person left leg bend -->
  <path d="M178 143 Q172 155 162 158" stroke="#334155" stroke-width="13" stroke-linecap="round"/>
  <!-- person right leg -->
  <path d="M202 143 Q208 155 210 158" stroke="#334155" stroke-width="13" stroke-linecap="round"/>
  <!-- shoes -->
  <ellipse cx="160" cy="160" rx="10" ry="5" fill="#1e293b"/>
  <ellipse cx="212" cy="160" rx="10" ry="5" fill="#1e293b"/>

  <!-- person body -->
  <rect x="173" y="82" width="35" height="40" rx="10" fill="#2563eb"/>
  <!-- left arm on keyboard -->
  <path d="M173 100 Q148 115 130 122" stroke="#fcd9b6" stroke-width="11" stroke-linecap="round"/>
  <!-- right arm on keyboard -->
  <path d="M208 100 Q218 115 220 122" stroke="#fcd9b6" stroke-width="11" stroke-linecap="round"/>
  <!-- hands -->
  <circle cx="128" cy="122" r="7" fill="#fcd9b6"/>
  <circle cx="222" cy="122" r="7" fill="#fcd9b6"/>

  <!-- person neck -->
  <rect x="182" y="70" width="17" height="14" rx="6" fill="#fcd9b6"/>
  <!-- person head -->
  <circle cx="190" cy="58" r="19" fill="#fcd9b6"/>
  <!-- hair -->
  <path d="M172 55 Q173 38 190 36 Q207 34 210 50 L208 56 Q200 44 190 44 Q178 45 172 58Z" fill="#1e293b"/>
  <!-- face: eye 1 -->
  <ellipse cx="184" cy="57" rx="2.5" ry="3" fill="#1e293b"/>
  <!-- face: eye 2 -->
  <ellipse cx="196" cy="57" rx="2.5" ry="3" fill="#1e293b"/>
  <!-- smile -->
  <path d="M184 65 Q190 70 196 65" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- floating profile card -->
  <rect x="18" y="66" width="72" height="58" rx="10" fill="white"
        style="filter:drop-shadow(0 6px 16px rgba(37,99,235,.18))"/>
  <!-- avatar circle on card -->
  <circle cx="54" cy="84" r="12" fill="#bfdbfe"/>
  <circle cx="54" cy="80" r="5"  fill="#93c5fd"/>
  <path d="M42 96 Q54 90 66 96" fill="#93c5fd"/>
  <!-- card lines -->
  <rect x="30" y="102" width="48" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="36" y="110" width="36" height="4" rx="2" fill="#eff6ff"/>

  <!-- floating check badge -->
  <circle cx="238" cy="90" r="16" fill="#2563eb"
          style="filter:drop-shadow(0 4px 10px rgba(37,99,235,.35))"/>
  <path d="M230 90 L235 96 L246 83" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>