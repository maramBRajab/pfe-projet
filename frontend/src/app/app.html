<ng-container *ngIf="isLoggedIn; else guestOutlet">
  <div class="app-shell">

    <div *ngIf="!isAdminRole && !isCollaborateurWorkspaceRoute && !isManagerWorkspaceRoute && !isLandingRoute" class="global-session-actions">
      <div class="global-session-chip" [attr.data-role]="userRole || null">
        <span class="global-session-chip__avatar">{{ displayUserInitiales }}</span>
        <span class="global-session-chip__label">{{ roleBadgeLabel }}</span>
      </div>

      <button type="button" class="global-logout-btn" (click)="logout()" title="Se déconnecter">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 2.5H4.75A1.75 1.75 0 0 0 3 4.25v7.5c0 .966.784 1.75 1.75 1.75H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M9 5l3 3-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 8H6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Déconnexion
      </button>
    </div>

    <!-- ✅ NAVBARS SUPPRIMÉES -->
    <!-- Les 2 navbars (collaborateur et admin) ont été supprimées -->
    <!-- Le contenu démarre au pixel 0 du haut -->

    <div class="shell-main">
      <!-- PAGE CONTENT -->
      <main class="shell-content">
        <router-outlet></router-outlet>
      </main>
    </div>

    <!-- Chatbot IA : visible uniquement dans l'espace manager -->
    <app-chatbot *ngIf="canManageResources && isManagerWorkspaceRoute"></app-chatbot>

  </div>
</ng-container>

<ng-template #guestOutlet>
  <router-outlet></router-outlet>
</ng-template>
