<section class="sp-root" [class.sp-root--plain]="disabled">
  <aside class="sa-sidebar" *ngIf="!disabled">
    <div class="sa-brand">
      <img src="assets/logo sopra.png" alt="Sopra HR" class="sa-brand-logo-img" />
      <div>
        <div class="sa-brand-title">SmartAssign</div>
        <div class="sa-brand-sub">ESPACE MANAGER</div>
      </div>
    </div>

    <nav class="sa-nav">
      <p class="sa-nav-section">Principal</p>
      <a routerLink="/manager/dashboard" routerLinkActive="sa-nav-item--active" [routerLinkActiveOptions]="{ exact: true }" class="sa-nav-item">
        <i class="ti ti-layout-dashboard"></i>
        Supervision
      </a>

      <p class="sa-nav-section">Gestion</p>
      <a routerLink="/manager/projets" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-folder"></i>
        Projets
        <span class="sa-badge" *ngIf="projectBadge !== null">{{ projectBadge }}</span>
      </a>
      <a routerLink="/manager/collaborateurs" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-users"></i>
        Collaborateurs
        <span class="sa-badge" *ngIf="collaboratorBadge !== null">{{ collaboratorBadge }}</span>
      </a>
      <a routerLink="/manager/charge-travail" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-chart-bar"></i>
        Charge de travail
      </a>

      <p class="sa-nav-section">Affectations</p>
      <a routerLink="/manager/affectation" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-sparkles"></i>
        Affectations IA
        <span class="sa-badge" *ngIf="affectationIaBadge !== null">{{ affectationIaBadge }}</span>
      </a>
      <a routerLink="/manager/historique-affectations" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-history"></i>
        Historique
      </a>
      <a routerLink="/manager/notifications" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-bell"></i>
        Notifications
        <span class="sa-badge" *ngIf="notificationBadge !== null && notificationBadge > 0">{{ notificationBadge }}</span>
      </a>

      <p class="sa-nav-section">Système</p>
      <a routerLink="/manager/profil" routerLinkActive="sa-nav-item--active" class="sa-nav-item">
        <i class="ti ti-user"></i>
        Mon profil
      </a>
    </nav>

    <div class="sa-user-block">
      <button type="button" class="sa-logout" (click)="logout()">
        → D&eacute;connexion
      </button>
    </div>
  </aside>

  <div class="sp-main" [class.sp-main--plain]="disabled">
    <ng-content select="app-manager-topbar"></ng-content>
    <div class="sp-body" [class.sp-body--plain]="disabled">
      <ng-content></ng-content>
    </div>
  </div>

  <app-manager-notifications-panel
    *ngIf="!disabled"
    [open]="notificationsPanel.isOpen()"
    (close)="notificationsPanel.close()"
  ></app-manager-notifications-panel>
</section>
