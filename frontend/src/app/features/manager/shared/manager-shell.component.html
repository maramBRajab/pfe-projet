<section class="sp-root" [class.sp-root--plain]="disabled">
  <aside class="sp-sidebar" *ngIf="!disabled">
    <div class="sp-sidebar__brand">
      <img src="assets/logo sopra.png" alt="Sopra HR" class="app-logo" style="width:34px;height:34px;object-fit:contain;background:none!important;border-radius:0!important;display:block;box-shadow:none!important;padding:0!important;z-index:2;position:relative;" />
      <div class="sp-brand-text">
        <span class="sp-brand-name">Sopra HR</span>
        <span class="sp-brand-tag">Espace manager</span>
      </div>
    </div>

    <nav class="sp-nav">
      <p class="sp-nav__section">Principal</p>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'dashboard'" routerLink="/manager/dashboard">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="2" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="9" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/></svg>
        </span>
        Dashboard
      </a>
      <p class="sp-nav__section sp-nav__section--spaced">Gestion</p>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'projets'" routerLink="/manager/projets">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4Z" stroke="currentColor" stroke-width="1.4"/><path d="M5 8h6M5 11h4M5 5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        Projets
        <span class="sp-nav__badge" *ngIf="projectBadge !== null">{{ projectBadge }}</span>
      </a>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'collaborateurs'" routerLink="/manager/collaborateurs">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 13c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="11.5" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M13.5 12.5c0-1.657-1.118-3-2.5-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </span>
        Collaborateurs
        <span class="sp-nav__badge" *ngIf="collaboratorBadge !== null">{{ collaboratorBadge }}</span>
      </a>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'charge'" routerLink="/manager/charge-travail">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 12V8l3-3 3 3 4-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        Charge de travail
      </a>

      <p class="sp-nav__section sp-nav__section--spaced">Affectations</p>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'affectation'" routerLink="/manager/affectation">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        Affectations IA
        <span class="sp-nav__badge sp-nav__badge--red">0</span>
      </a>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'historique'" routerLink="/manager/historique-affectations">
        <span class="sp-nav__ico"><i class="ti ti-history" style="font-size:15px"></i></span>
        Historique
      </a>
      <a class="sp-nav__item" [class.sp-nav__item--active]="activeSection === 'notifications'" routerLink="/manager/notifications">
        <span class="sp-nav__ico"><i class="ti ti-bell" style="font-size:15px"></i></span>
        Notifications
        <span class="sp-nav__badge">3</span>
      </a>

    </nav>

    <div class="sp-sidebar__footer">
      <div class="sp-footer-user" routerLink="/manager/profil" style="cursor:pointer">
        <div class="sp-user-av">MS</div>
        <div class="sp-user-info">
          <div class="sp-user-name">Manager SmartAssign</div>
          <div class="sp-user-role">Manager</div>
        </div>
      </div>
      <button type="button" class="sp-nav__item sp-nav__item--logout" (click)="logout()">
        <span class="sp-nav__ico">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M6 14H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10.5 11l3-3-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.5 8H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        D&eacute;connexion
      </button>
    </div>
  </aside>

  <div class="sp-main" [class.sp-main--plain]="disabled">
    <div class="sp-body" [class.sp-body--plain]="disabled">
      <ng-content></ng-content>
    </div>
  </div>

  <app-manager-notifications-panel
    *ngIf="!disabled"
    [open]="notificationsPanel.isOpen()"
    (close)="notificationsPanel.close()"
  ></app-manager-notifications-panel>
</section>
