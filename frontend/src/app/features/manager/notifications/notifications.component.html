<app-manager-shell activeSection="notifications" [projectBadge]="3" [collaboratorBadge]="11">
  <app-manager-topbar
    breadcrumb="SmartAssign › Manager › Notifications"
    [notificationCount]="notifCount">
  </app-manager-topbar>

  <div class="main-area">
    <div class="content">
      <div class="title-row">
        <h1 class="title-row__title">Centre de notifications</h1>
        <div class="title-row__actions">
          <span class="status-pill"><span class="dot"></span> Flux normal</span>
          <button class="btn-ghost" type="button" (click)="refresh()">
            <i class="ti ti-refresh"></i> Actualiser
          </button>
          <button class="btn-success-outline" type="button" (click)="markAllRead()">
            <i class="ti ti-check"></i> Tout marquer lu
          </button>
        </div>
      </div>

      <div class="kpi-grid">
        <app-kpi-card label="Total alertes" [value]="stats.total" subtitle="Toutes notifications actives" [badge]="stats.total + ' total'" tone="neutral"></app-kpi-card>
        <app-kpi-card label="Vigilances" [value]="stats.vigilances" subtitle="Nécessitent attention" badge="Vigilance" tone="amber" valueTone="amber"></app-kpi-card>
        <app-kpi-card label="Informations" [value]="stats.informations" subtitle="Mises à jour système" badge="Info" tone="blue" valueTone="blue"></app-kpi-card>
        <app-kpi-card label="Critiques" [value]="stats.critiques" subtitle="Actions immédiates requises" badge="Critique" tone="red" valueTone="red"></app-kpi-card>
      </div>

      <div class="notif-card">
        <div class="notif-header">
          <div class="notif-header__title-wrap">
            <h2>Flux des notifications IA</h2>
            <span class="notif-header__count">{{ notifCount }}</span>
          </div>
          <button class="notif-mark-read-link" type="button" (click)="markAllRead()">✓ Tout marquer lu</button>
        </div>

        <div class="notif-list">
          <div *ngFor="let notif of notifications"
               class="notif-item"
               [class.vigilance]="notif.type === 'VIGILANCE'"
               [class.unread]="!notif.lu">

            <div class="notif-icon" [class.notif-icon--vigilance]="notif.type === 'VIGILANCE'">
              <i class="ti" [ngClass]="notif.type === 'VIGILANCE' ? 'ti-alert-triangle' : notif.icon"></i>
            </div>

            <div class="notif-content">
              <div class="notif-title-row">
                <span class="notif-title">{{ notif.titre }}</span>
                <span class="notif-badge" [ngClass]="notif.type === 'VIGILANCE' ? 'badge-vigilance' : notif.badgeClass">
                  {{ notif.type === 'VIGILANCE' ? 'VIGILANCE' : notif.type }}
                </span>
              </div>
              <div class="notif-sub">{{ notif.description }}</div>
              <div class="notif-time">Échéance : {{ notif.temps }}</div>
            </div>
          </div>

          <div *ngIf="notifications.length === 0" class="empty-state">
            <i class="ti ti-bell-off"></i>
            <p>Aucune notification pour le moment.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</app-manager-shell>
