<app-manager-shell activeSection="profil" [projectBadge]="projetsCount" [collaboratorBadge]="collaborateursCount">
  <app-manager-topbar
    breadcrumb="SmartAssign › Manager › Mon Profil"
    [notificationCount]="0">
  </app-manager-topbar>

  <!-- ═══ MAIN ═════════════════════════════════════════════════════════ -->
  <div class="mp-main">
    <!-- CONTENT -->
    <div class="mp-content">

      <div class="pf-photo-header">
        <div class="pf-photo-wrapper">
          <img *ngIf="photoUrl" [src]="photoUrl" class="pf-photo-img" alt="Photo de profil">
          <div *ngIf="!photoUrl" class="pf-photo-initials">{{ (prenom?.charAt(0) ?? '') + (nom?.charAt(0) ?? '') }}</div>
          <label class="pf-photo-overlay" title="Changer la photo">
            <i class="ti ti-camera"></i>
            <input type="file" accept="image/*" (change)="onPhotoChange($event)" hidden>
          </label>
        </div>
        <div class="pf-photo-info">
          <div class="pf-photo-name">{{ prenom }} {{ nom }}</div>
          <div class="pf-photo-role">{{ poste }}</div>
          <div class="pf-photo-email">{{ email }}</div>
        </div>
      </div>

      <!-- 2-COL GRID -->
      <div class="mp-grid">

        <!-- LEFT — Personal info form -->
        <div class="mp-card">
          <div class="mp-card__kicker">Édition</div>
          <h2 class="mp-card__title">Informations personnelles</h2>

          <div class="mp-form-row2">
            <div class="mp-field">
              <label class="mp-label">Prénom</label>
              <input type="text" class="mp-input" [(ngModel)]="prenom" placeholder="Prénom" />
            </div>
            <div class="mp-field">
              <label class="mp-label">Nom</label>
              <input type="text" class="mp-input" [(ngModel)]="nom" placeholder="Nom" />
            </div>
          </div>

          <div class="mp-field">
            <label class="mp-label">Email</label>
            <input type="email" class="mp-input" [(ngModel)]="email" placeholder="Email" />
          </div>

          <div class="mp-form-row2">
            <div class="mp-field">
              <label class="mp-label">Téléphone</label>
              <input type="tel" class="mp-input" [(ngModel)]="telephone" placeholder="+216 …" />
            </div>
            <div class="mp-field">
              <label class="mp-label">Poste</label>
              <input type="text" class="mp-input" [(ngModel)]="poste" placeholder="Poste" />
            </div>
          </div>

          <div class="mp-field">
            <label class="mp-label">Département</label>
            <input type="text" class="mp-input" value="Direction des opérations" readonly />
          </div>

          <div class="mp-btn-row">
            <button type="button" class="mp-btn mp-btn--primary" 
              (click)="saveProfile()" 
              [disabled]="isSaving">
              <i class="ti ti-check"></i> 
              {{ isSaving ? 'Enregistrement...' : 'Enregistrer' }}
            </button>
            <button type="button" class="mp-btn mp-btn--ghost" (click)="cancelEdit()">
              Annuler
            </button>
          </div>

          <div *ngIf="feedbackMsg" class="mp-feedback" [class.mp-feedback--success]="feedbackTone === 'success'" [class.mp-feedback--error]="feedbackTone === 'error'">
            {{ feedbackMsg }}
          </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="mp-right-col">

          <!-- Password card -->
          <div class="mp-card">
            <div class="mp-card__kicker">Sécurité</div>
            <h2 class="mp-card__title">Modifier le mot de passe</h2>

            <div class="mp-field">
              <label class="mp-label">MOT DE PASSE ACTUEL</label>
              <input type="password" class="mp-input" [(ngModel)]="currentPassword" />
            </div>

            <div class="mp-form-row2">
              <div class="mp-field">
                <label class="mp-label">NOUVEAU</label>
                <input type="password" class="mp-input" [(ngModel)]="newPassword" />
              </div>
              <div class="mp-field">
                <label class="mp-label">CONFIRMATION</label>
                <input type="password" class="mp-input" [(ngModel)]="confirmPassword" />
              </div>
            </div>

            <div style="margin-top:16px">
              <button type="button" class="mp-btn mp-btn--primary mp-btn--block" (click)="changePassword()">
                <i class="ti ti-lock"></i> Valider
              </button>
            </div>

            <div *ngIf="pwdMsg" class="mp-feedback" [class.mp-feedback--success]="pwdTone === 'success'" [class.mp-feedback--error]="pwdTone === 'error'">
              {{ pwdMsg }}
            </div>
          </div>

        </div><!-- /right col -->

      </div><!-- /mp-grid -->

    </div><!-- /mp-content -->
  </div><!-- /mp-main -->
</app-manager-shell>
