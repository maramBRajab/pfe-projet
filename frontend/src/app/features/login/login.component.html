<div class="sl-page">
  <div class="sl-right">
    <div class="sl-card">

      <!-- Card header -->
      <div class="sl-card__hd">
        <img src="assets/logo sopra.png" alt="Sopra HR" class="app-logo sl-card__logo" style="width:36px;height:36px;object-fit:contain;background:none!important;border-radius:0!important;display:block;box-shadow:none!important;padding:0!important;z-index:2;position:relative;" />
        <h2 class="sl-card__title">Connexion</h2>
        <p class="sl-card__sub">Connectez-vous &#224; votre espace SmartAssign</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" novalidate autocomplete="on" [attr.aria-busy]="isSubmitting">

        <!-- Email -->
        <div class="sl-field" [class.sl-field--error]="emailError">
          <label class="sl-field__label" for="sl-email">ADRESSE EMAIL</label>
          <div class="sl-field__wrap">
            <i class="ti ti-mail sl-field__ico"></i>
            <input
              type="email"
              id="sl-email"
              name="email"
              class="sl-field__input"
              [(ngModel)]="email"
              (ngModelChange)="onCredentialsChange('email')"
              autocomplete="email"
              inputmode="email"
              autocapitalize="none"
              spellcheck="false"
              required
              [attr.aria-invalid]="emailError ? 'true' : 'false'"
            />
          </div>
          <p class="sl-field__err" *ngIf="emailError" role="alert">{{ emailError }}</p>
        </div>

        <!-- Password -->
        <div class="sl-field sl-field--mb20" [class.sl-field--error]="passwordError">
          <label class="sl-field__label" for="sl-password">MOT DE PASSE</label>
          <div class="sl-field__wrap">
            <i class="ti ti-lock sl-field__ico"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="sl-password"
              name="password"
              class="sl-field__input sl-field__input--pw"
              [(ngModel)]="password"
              (ngModelChange)="onCredentialsChange('password')"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
              required
              [attr.aria-invalid]="passwordError ? 'true' : 'false'"
            />
            <button type="button" class="sl-field__toggle" (click)="togglePassword()">
              {{ showPassword ? 'Masquer' : 'Afficher' }}
            </button>
          </div>
          <p class="sl-field__err" *ngIf="passwordError" role="alert">{{ passwordError }}</p>
        </div>

        <!-- Remember + Forgot -->
        <div class="sl-options">
          <label class="sl-options__remember">
            <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" (ngModelChange)="onRememberMeChange($event)" />
            <span class="sl-options__check"><i class="ti ti-check" *ngIf="rememberMe"></i></span>
            <span class="sl-options__lbl">Se souvenir de moi</span>
          </label>
          <a routerLink="/forgot-password" class="sl-options__forgot">Mot de passe oubli&#233; ?</a>
        </div>

        <!-- Error -->
        <div class="sl-alert" *ngIf="errorMessage" role="alert" aria-live="assertive">{{ errorMessage }}</div>

        <!-- Submit -->
        <button type="submit" class="sl-submit" [disabled]="isSubmitting">
          <span class="sl-submit__spinner" *ngIf="isSubmitting"></span>
          <i class="ti ti-login" *ngIf="!isSubmitting"></i>
          {{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
        </button>

        <!-- Back to home -->
        <a routerLink="/" class="sl-back-home">
          <i class="ti ti-arrow-left"></i>
          Retour à l'accueil
        </a>

      </form>
    </div>
  </div>
</div>
