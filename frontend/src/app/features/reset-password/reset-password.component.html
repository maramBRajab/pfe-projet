<div class="sl-page">
  <div class="sl-right">
    <div class="sl-card">

      <!-- Card header -->
      <div class="sl-card__hd">
        <img src="assets/logo sopra.png" alt="Sopra HR" class="app-logo sl-card__logo"
          style="width:36px;height:36px;object-fit:contain;background:none!important;border-radius:0!important;display:block;box-shadow:none!important;padding:0!important;z-index:2;position:relative;" />
        <h2 class="sl-card__title">Réinitialisation</h2>
        <p class="sl-card__sub" *ngIf="isCheckingToken">Vérification du lien sécurisé…</p>
        <p class="sl-card__sub" *ngIf="!isCheckingToken && !tokenErrorMessage">Choisissez un nouveau mot de passe.</p>
        <p class="sl-card__sub" *ngIf="tokenErrorMessage">Le lien est invalide ou a expiré.</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" novalidate autocomplete="off">

        <!-- Token error -->
        <div class="sl-alert" *ngIf="tokenErrorMessage" role="alert">{{ tokenErrorMessage }}</div>

        <!-- General error -->
        <div class="sl-alert" *ngIf="!tokenErrorMessage && errorMessage" role="alert">{{ errorMessage }}</div>

        <!-- Success -->
        <div class="sl-alert sl-alert--success" *ngIf="successMessage" role="alert">{{ successMessage }}</div>

        <!-- Nouveau mot de passe -->
        <div class="sl-field" *ngIf="!tokenErrorMessage">
          <label class="sl-field__label" for="rp-new">NOUVEAU MOT DE PASSE</label>
          <div class="sl-field__wrap">
            <i class="ti ti-lock sl-field__ico"></i>
            <input
              [type]="showNewPassword ? 'text' : 'password'"
              id="rp-new"
              name="newPassword"
              class="sl-field__input sl-field__input--pw"
              [(ngModel)]="newPassword"
              placeholder="Nouveau mot de passe"
              autocomplete="new-password"
              [disabled]="isCheckingToken || isSubmitting || !!successMessage"
            />
            <button type="button" class="sl-field__toggle" (click)="toggleNewPassword()">
              {{ showNewPassword ? 'Masquer' : 'Afficher' }}
            </button>
          </div>
        </div>

        <!-- Confirmer mot de passe -->
        <div class="sl-field" *ngIf="!tokenErrorMessage">
          <label class="sl-field__label" for="rp-confirm">CONFIRMER LE MOT DE PASSE</label>
          <div class="sl-field__wrap">
            <i class="ti ti-lock sl-field__ico"></i>
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="rp-confirm"
              name="confirmPassword"
              class="sl-field__input sl-field__input--pw"
              [(ngModel)]="confirmPassword"
              placeholder="Confirmer le nouveau mot de passe"
              autocomplete="new-password"
              [disabled]="isCheckingToken || isSubmitting || !!successMessage"
            />
            <button type="button" class="sl-field__toggle" (click)="toggleConfirmPassword()">
              {{ showConfirmPassword ? 'Masquer' : 'Afficher' }}
            </button>
          </div>
          <p class="sl-field__hint">8 caractères min. — majuscule, minuscule et chiffre.</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="sl-submit"
          *ngIf="!tokenErrorMessage"
          [disabled]="isCheckingToken || isSubmitting || !newPassword || !confirmPassword || !!successMessage"
        >
          <span class="sl-submit__spinner" *ngIf="isSubmitting"></span>
          <i class="ti ti-lock-check" *ngIf="!isSubmitting"></i>
          {{ isSubmitting ? 'Mise à jour…' : 'Modifier le mot de passe' }}
        </button>

        <!-- Back to login -->
        <a routerLink="/login" class="sl-back-home">
          <i class="ti ti-arrow-left"></i>
          Retour à la connexion
        </a>

      </form>
    </div>
  </div>
</div>
