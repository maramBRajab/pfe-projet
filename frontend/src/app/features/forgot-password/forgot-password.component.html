<div class="sl-page">
  <div class="sl-right">
    <div class="sl-card">

      <!-- Card header -->
      <div class="sl-card__hd">
        <img src="assets/logo sopra.png" alt="Sopra HR" class="app-logo sl-card__logo" style="width:36px;height:36px;object-fit:contain;background:none!important;border-radius:0!important;display:block;box-shadow:none!important;padding:0!important;z-index:2;position:relative;" />
        <h2 class="sl-card__title">Mot de passe oublié</h2>
        <p class="sl-card__sub">Entrez votre e-mail pour recevoir le lien de réinitialisation.</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" novalidate autocomplete="on" [attr.aria-busy]="isSubmitting" [class.sl-form--done]="submitted">

        <!-- Email -->
        <div class="sl-field" [class.sl-field--error]="emailError">
          <label class="sl-field__label" for="fp-email">ADRESSE EMAIL</label>
          <div class="sl-field__wrap">
            <i class="ti ti-mail sl-field__ico"></i>
            <input
              type="email"
              id="fp-email"
              name="email"
              class="sl-field__input"
              [(ngModel)]="email"
              (ngModelChange)="onEmailChange()"
              autocomplete="email"
              inputmode="email"
              autocapitalize="none"
              spellcheck="false"
              required
              [disabled]="isSubmitting || submitted"
              [attr.aria-invalid]="emailError ? 'true' : 'false'"
            />
          </div>
          <p class="sl-field__err" *ngIf="emailError" role="alert">{{ emailError }}</p>
        </div>

        <!-- Error -->
        <div class="sl-alert" *ngIf="errorMessage" role="alert" aria-live="assertive">{{ errorMessage }}</div>

        <!-- Success -->
        <div class="sl-alert sl-alert--success" *ngIf="successMessage" role="alert" aria-live="assertive">{{ successMessage }}</div>

        <!-- Submit -->
        <button type="submit" class="sl-submit" [disabled]="isSubmitting || submitted">
          <span class="sl-submit__spinner" *ngIf="isSubmitting"></span>
          <i class="ti ti-send" *ngIf="!isSubmitting && !submitted"></i>
          <i class="ti ti-circle-check" *ngIf="submitted && !isSubmitting"></i>
          {{ isSubmitting ? 'Envoi en cours…' : (submitted ? 'Lien envoyé' : 'Envoyer le lien') }}
        </button>

        <!-- Back to login -->
        <a routerLink="/login" class="sl-back-home">
          <i class="ti ti-arrow-left"></i>
          Retour à la connexion
        </a>

      </form>
    </div>
  </div>
</div>
