<!-- Bouton flottant -->
<button type="button" class="chat-fab" (click)="toggleChat()" [attr.aria-label]="isOpen ? 'Fermer le chat' : 'Ouvrir le chat'">
  <span *ngIf="!isOpen">💬</span>
  <span *ngIf="isOpen">×</span>
  <span class="unread-badge" *ngIf="!isOpen && unreadCount > 0">{{ unreadCount }}</span>
</button>

<!-- Fenêtre latérale -->
<aside class="chat-window" [class.open]="isOpen" role="dialog" aria-label="Assistant IA SmartAssign">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-avatar">🤖</div>
      <div>
        <div class="chat-title">Assistant IA SmartAssign</div>
        <div class="chat-subtitle"><span class="dot-online"></span> En ligne</div>
      </div>
    </div>
    <div class="chat-header-actions">
      <button type="button" (click)="clearHistory()" title="Effacer l'historique">🗑️</button>
      <button type="button" (click)="closeChat()" title="Fermer">✕</button>
    </div>
  </div>

  <div class="chat-messages" #messagesContainer>
    <div *ngFor="let msg of messages" class="msg-row" [class.user]="msg.role === 'user'">
      <ng-container *ngIf="msg.role === 'user'">
        <div class="msg-bubble user-bubble">{{ msg.content }}</div>
        <div class="msg-avatar user-av">MS</div>
      </ng-container>

      <ng-container *ngIf="msg.role === 'assistant'">
        <div class="msg-avatar bot-av">🤖</div>
        <div class="msg-bubble bot-bubble" [class.loading]="msg.isLoading">
          <ng-container *ngIf="msg.isLoading">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </ng-container>

          <ng-container *ngIf="!msg.isLoading">
            <div [innerHTML]="renderHtml(msg.content)"></div>
            <div class="msg-time">{{ msg.timestamp | date:'HH:mm' }}</div>
          </ng-container>
        </div>
      </ng-container>
    </div>
  </div>

  <div class="suggestions" *ngIf="suggestions.length && !isTyping">
    <button type="button" class="suggestion-chip" *ngFor="let s of suggestions" (click)="sendMessage(s)">
      {{ s }}
    </button>
  </div>

  <div class="chat-input-area">
    <input
      type="text"
      class="chat-input"
      [(ngModel)]="inputMessage"
      [disabled]="isTyping"
      (keydown)="onKeyDown($event)"
      placeholder="Votre question..."
      autocomplete="off">
    <button type="button" class="send-btn" (click)="sendMessage()" [disabled]="isTyping || !inputMessage.trim()" aria-label="Envoyer">
      ➤
    </button>
  </div>
</aside>
